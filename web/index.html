<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>画像 → SVG 変換システム | Image2SVG Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=M+PLUS+Rounded+1c:wght@400;700&family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@300;400;500;700&family=Yusei+Magic&family=Zen+Kaku+Gothic+New:wght@400;700&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface2: #1c1c28;
      --accent: #7c6ff7;
      --accent2: #f770b0;
      --text: #e8e8f0;
      --text-muted: #8888aa;
      --border: #2a2a3a;
      --success: #4ecdc4;
      --error: #ff6b6b;
      --radius: 12px;
      --radius-lg: 20px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', 'Noto Sans JP', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 80% 50% at 20% 10%, rgba(124, 111, 247, .12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(247, 112, 176, .08) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .header-bar {
      position: relative;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      background: rgba(19, 19, 26, 0.8);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(8px);
    }

    .header-title {
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(120deg, var(--text), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
    }

    .btn-primary {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-primary:hover {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    .btn-success {
      background: var(--success);
      color: #111;
    }

    .btn-success:hover {
      background: #38b2ac;
    }

    .btn-danger {
      background: rgba(255, 107, 107, 0.1);
      color: var(--error);
      border: 1px solid var(--error);
    }

    .btn-danger:hover {
      background: rgba(255, 107, 107, 0.2);
    }

    .content-area {
      flex: 1;
      display: flex;
      position: relative;
      z-index: 1;
      overflow: hidden;
    }

    /* ── アップロード画面 ── */
    #upload-view {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      z-index: 5;
    }

    .upload-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 40px;
      width: 100%;
      max-width: 600px;
      text-align: center;
    }

    #drop-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 50px 20px;
      cursor: pointer;
      transition: all .25s;
      background: var(--surface2);
    }

    #drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(124, 111, 247, .08);
      transform: scale(1.02);
    }

    .drop-icon {
      font-size: 48px;
      opacity: .7;
      margin-bottom: 12px;
    }

    .drop-text {
      font-size: 16px;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .drop-hint {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* ── エディター画面 ── */
    #editor-view {
      display: none;
      width: 100%;
      height: 100%;
    }

    .editor-layout {
      display: flex;
      width: 100%;
      height: 100%;
    }

    .canvas-pane {
      flex: 1;
      background: #000;
      overflow: auto;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .canvas-wrapper {
      position: relative;
      width: 940px;
      height: 580px;
      background: white;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
      transform-origin: center center;
    }

    .canvas-border {
      position: absolute;
      inset: 0;
      pointer-events: none;
      border: 1px solid #ff00ff;
      opacity: 0.3;
    }

    .ce {
      position: absolute;
      cursor: grab;
      user-select: none;
      transform-origin: top left;
    }

    .ce:active {
      cursor: grabbing;
    }

    .ce-text {
      white-space: nowrap;
      line-height: 1;
    }

    .ce-image {
      object-fit: contain;
      -webkit-user-drag: none;
    }

    .ce-shape {
      border: 1px solid rgba(0, 0, 0, 0.1);
    }

    .ce.selected {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    /* リサイズハンドル */
    .resize-handle {
      position: absolute;
      width: 8px;
      height: 8px;
      background: white;
      border: 2px solid var(--accent);
      border-radius: 2px;
      cursor: nwse-resize;
      z-index: 200;
      pointer-events: all;
    }
    .resize-handle[data-dir="n"]  { top:-5px; left:50%; transform:translateX(-50%); cursor:ns-resize; }
    .resize-handle[data-dir="s"]  { bottom:-5px; left:50%; transform:translateX(-50%); cursor:ns-resize; }
    .resize-handle[data-dir="e"]  { right:-5px; top:50%; transform:translateY(-50%); cursor:ew-resize; }
    .resize-handle[data-dir="w"]  { left:-5px; top:50%; transform:translateY(-50%); cursor:ew-resize; }
    .resize-handle[data-dir="nw"] { top:-5px; left:-5px; cursor:nwse-resize; }
    .resize-handle[data-dir="ne"] { top:-5px; right:-5px; cursor:nesw-resize; }
    .resize-handle[data-dir="sw"] { bottom:-5px; left:-5px; cursor:nesw-resize; }
    .resize-handle[data-dir="se"] { bottom:-5px; right:-5px; cursor:nwse-resize; }

    .color-palette {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 6px;
      margin-top: 8px;
    }

    .color-swatch {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 4px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      cursor: pointer;
      transition: transform 0.1s;
    }

    .color-swatch:hover {
      transform: scale(1.1);
      border-color: #fff;
    }

    .rs-handle {
      width: 10px;
      height: 10px;
      background: #fff;
      border: 1px solid var(--accent);
      border-radius: 50%;
    }

    /* 右パネル */
    .props-pane {
      width: 320px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    .props-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      display: flex;
      justify-content: space-between;
    }

    .props-body {
      padding: 16px;
      overflow-y: auto;
      flex: 1;
    }

    .prop-group {
      margin-bottom: 16px;
    }

    .prop-group label {
      display: block;
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .prop-group input,
    .prop-group textarea,
    .prop-group select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 8px 12px;
      font-size: 13px;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    .prop-group input:focus,
    .prop-group textarea:focus {
      border-color: var(--accent);
      outline: none;
    }

    .prop-group textarea {
      resize: vertical;
      min-height: 60px;
    }

    .prop-row {
      display: flex;
      gap: 8px;
    }

    .empty-state {
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
      padding: 40px 20px;
    }

    .tools-pane {
      padding: 16px;
      border-top: 1px solid var(--border);
      background: var(--surface2);
    }

    .loader {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, .3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: inline-block;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>

  <header class="header-bar">
    <div class="header-title">Image2SVG Editor</div>
    <div id="header-actions" style="display:none">
      <button id="dl-svg-btn" class="btn btn-success">⬇ SVGを生成 & ダウンロード</button>
    </div>
  </header>

  <div class="content-area">
    <div id="upload-view">
      <div class="upload-card">
        <h2 style="margin-bottom:8px">名刺画像をアップロード</h2>
        <p style="color:var(--text-muted);font-size:14px;margin-bottom:24px">OCRでテキストを自動解析し、編集可能なレイアウトを生成します。</p>

        <div id="drop-zone">
          <div class="drop-icon">📇</div>
          <div class="drop-text">ここに画像をドロップ</div>
          <div class="drop-hint" id="drop-hint-text">PNG / JPG / WEBP / PDF 対応</div>
          <input type="file" id="file-input" accept=".png,.jpg,.jpeg,.webp,.pdf" style="display:none" />
        </div>
      </div>
    </div>

    <div id="editor-view">
      <div class="editor-layout">
        <div class="canvas-pane" id="canvas-pane">
          <div id="canvas-scaler" style="position:relative; transition: width 0.2s, height 0.2s;">
            <div class="canvas-wrapper" id="canvas" style="transform-origin: top left;">
              <div class="canvas-border"></div>
              <div id="selection-box"
                style="position:absolute; border:1px dashed var(--accent); background:rgba(124,111,247,0.15); pointer-events:none; display:none; z-index:100;">
              </div>
              <div id="guide-x"
                style="position:absolute; width:1px; height:100%; top:0; background:rgba(0, 255, 255, 0.5); pointer-events:none; display:none; z-index:1000;">
              </div>
              <div id="guide-y"
                style="position:absolute; height:1px; width:100%; left:0; background:rgba(0, 255, 255, 0.5); pointer-events:none; display:none; z-index:1000;">
              </div>
            </div>
          </div>
        </div>

        <div class="props-pane">
          <div class="props-header">
            <span>プロパティ</span>
            <span id="prop-id" style="color:var(--accent2);font-size:11px"></span>
          </div>
          <div class="props-body" id="props-panel">
            <div class="empty-state">キャンバス上の要素をクリックして編集<br><br><small
                style="color:var(--text-muted)">Shift+クリックで複数選択<br>ドラッグで範囲選択</small></div>
          </div>
          <div class="tools-pane">
            <div style="display:flex; gap:8px; margin-bottom:8px;">
              <button id="add-rect-btn" class="btn btn-primary" style="flex:1;">+ 四角形</button>
              <button id="add-circle-btn" class="btn btn-primary" style="flex:1;">+ 円形</button>
            </div>
            <button id="add-logo-btn" class="btn btn-primary"
              style="width:100%; background:var(--accent); color:white; border:none;">+ 画像(ロゴ)を追加</button>
            <input type="file" id="logo-input" accept="image/*" style="display:none" />
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ── グローバル状態 ──
    const state = {
      texts: [], shapes: [], images: [],
      selectedItems: [], // Array of {id, type}
      previewSvgMarkup: ''
    };

    let clipboard = [];
    let pasteOffset = 0;

    const uploadView = document.getElementById('upload-view');
    const editorView = document.getElementById('editor-view');
    const dropZone = document.getElementById('drop-zone');
    const dropHintText = document.getElementById('drop-hint-text');
    const fileInput = document.getElementById('file-input');
    const headerActions = document.getElementById('header-actions');
    const dlSvgBtn = document.getElementById('dl-svg-btn');

    const canvasPane = document.getElementById('canvas-pane');
    const canvas = document.getElementById('canvas');
    const propsPanel = document.getElementById('props-panel');
    const propIdLabel = document.getElementById('prop-id');
    const addLogoBtn = document.getElementById('add-logo-btn');
    const logoInput = document.getElementById('logo-input');

    let scale = 1.0;
    const textMeasureCanvas = document.createElement('canvas');
    const textMeasureCtx = textMeasureCanvas.getContext('2d');
    let previewTimer = null;
    let previewRequestToken = 0;
    let previewAppliedSignature = '';

    // ── 履歴 (Undo/Redo) ──
    const historyMax = 30;
    let historyState = [];
    let historyIndex = -1;

    function saveHistory() {
      const snapshot = JSON.stringify({
        texts: state.texts,
        shapes: state.shapes,
        images: state.images
      });

      if (historyIndex >= 0 && historyState[historyIndex] === snapshot) return;

      if (historyIndex < historyState.length - 1) {
        historyState = historyState.slice(0, historyIndex + 1);
      }

      historyState.push(snapshot);
      if (historyState.length > historyMax) historyState.shift();
      else historyIndex++;
    }

    function undo() {
      if (historyIndex > 0) {
        historyIndex--;
        restoreSnapshot(historyState[historyIndex]);
      }
    }

    function redo() {
      if (historyIndex < historyState.length - 1) {
        historyIndex++;
        restoreSnapshot(historyState[historyIndex]);
      }
    }

    function restoreSnapshot(snap) {
      const data = JSON.parse(snap);
      state.texts = data.texts;
      state.shapes = data.shapes;
      state.images = data.images;

      const valid = [...state.texts, ...state.shapes, ...state.images].map(x => x._id);
      state.selectedItems = state.selectedItems.filter(i => valid.includes(i.id));

      renderCanvas();
      renderProperties();
    }

    window.addEventListener('keydown', e => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;

      if (e.key === 'Delete' || e.key === 'Backspace') {
        if (state.selectedItems.length > 0) {
          e.preventDefault();
          state.selectedItems.forEach(item => {
            if (item.type === 'text') state.texts = state.texts.filter(x => x._id !== item.id);
            if (item.type === 'shape') state.shapes = state.shapes.filter(x => x._id !== item.id);
            if (item.type === 'image') state.images = state.images.filter(x => x._id !== item.id);
          });
          selectItem(null, null);
          renderCanvas();
          saveHistory();
        }
        return;
      }

      if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
        if (state.selectedItems.length > 0) {
          e.preventDefault();
          const d = e.shiftKey ? 1.0 : 0.1;
          state.selectedItems.forEach(item => {
            let obj = null;
            if (item.type === 'text') obj = state.texts.find(x => x._id === item.id);
            if (item.type === 'shape') obj = state.shapes.find(x => x._id === item.id);
            if (item.type === 'image') obj = state.images.find(x => x._id === item.id);
            if (obj) {
              if (e.key === 'ArrowUp') obj.y -= d;
              if (e.key === 'ArrowDown') obj.y += d;
              if (e.key === 'ArrowLeft') obj.x -= d;
              if (e.key === 'ArrowRight') obj.x += d;
              obj.x = parseFloat(obj.x.toFixed(2));
              obj.y = parseFloat(obj.y.toFixed(2));
            }
          });
          renderCanvas();
          if (state.selectedItems.length === 1) {
            const px = document.getElementById('prop-x');
            const py = document.getElementById('prop-y');
            if (px && py) {
              let obj = state.texts.find(x => x._id === state.selectedItems[0].id) ||
                state.shapes.find(x => x._id === state.selectedItems[0].id) ||
                state.images.find(x => x._id === state.selectedItems[0].id);
              if (obj) {
                px.value = obj.x;
                py.value = obj.y;
              }
            }
          }

          clearTimeout(window._arrowKeyHistoryTimer);
          window._arrowKeyHistoryTimer = setTimeout(() => {
            saveHistory();
          }, 400);
        }
        return;
      }

      const isMac = navigator.platform.toUpperCase().indexOf('MAC') >= 0;
      const isCtrl = isMac ? e.metaKey : e.ctrlKey;
      if (!isCtrl) return;

      if (e.key.toLowerCase() === 'z') {
        e.preventDefault();
        if (e.shiftKey) redo();
        else undo();
      } else if (e.key.toLowerCase() === 'y') {
        e.preventDefault();
        redo();
      } else if (e.key.toLowerCase() === 'c') {
        if (state.selectedItems.length > 0) {
          e.preventDefault();
          clipboard = state.selectedItems.map(item => {
            let obj = null;
            if (item.type === 'text') obj = state.texts.find(x => x._id === item.id);
            if (item.type === 'shape') obj = state.shapes.find(x => x._id === item.id);
            if (item.type === 'image') obj = state.images.find(x => x._id === item.id);
            return { type: item.type, data: JSON.parse(JSON.stringify(obj)) };
          }).filter(x => x.data);
          pasteOffset = 10;
        }
      } else if (e.key.toLowerCase() === 'x') {
        if (state.selectedItems.length > 0) {
          e.preventDefault();
          clipboard = state.selectedItems.map(item => {
            let obj = null;
            if (item.type === 'text') obj = state.texts.find(x => x._id === item.id);
            if (item.type === 'shape') obj = state.shapes.find(x => x._id === item.id);
            if (item.type === 'image') obj = state.images.find(x => x._id === item.id);
            return { type: item.type, data: JSON.parse(JSON.stringify(obj)) };
          }).filter(x => x.data);
          pasteOffset = 0;

          state.selectedItems.forEach(item => {
            if (item.type === 'text') state.texts = state.texts.filter(x => x._id !== item.id);
            if (item.type === 'shape') state.shapes = state.shapes.filter(x => x._id !== item.id);
            if (item.type === 'image') state.images = state.images.filter(x => x._id !== item.id);
          });
          state.selectedItems = [];
          renderCanvas();
          renderProperties();
          saveHistory();
        }
      } else if (e.key.toLowerCase() === 'v') {
        if (clipboard.length > 0) {
          e.preventDefault();
          const newSelected = [];
          clipboard.forEach(clip => {
            const newId = (window.crypto && window.crypto.randomUUID) ? window.crypto.randomUUID() : ('id_' + Math.random().toString(36).substr(2, 9));
            const newObj = JSON.parse(JSON.stringify(clip.data));
            newObj._id = newId;
            newObj.x += pasteOffset;
            newObj.y += pasteOffset;

            if (clip.type === 'text') state.texts.push(newObj);
            if (clip.type === 'shape') state.shapes.push(newObj);
            if (clip.type === 'image') state.images.push(newObj);

            newSelected.push({ id: newId, type: clip.type });
          });
          state.selectedItems = newSelected;
          pasteOffset += 10;
          renderCanvas();
          renderProperties();
          saveHistory();
        }
      }
    });

    // ── ファイルドロップ ──
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag-over'); if (e.dataTransfer.files[0]) processFile(e.dataTransfer.files[0]); });
    dropZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', e => { if (e.target.files[0]) processFile(e.target.files[0]); });

    async function processFile(file) {
      dropHintText.innerHTML = '<span class="loader"></span>解析中... (初回は数十秒かかります)';
      dropZone.style.pointerEvents = 'none';

      const fd = new FormData();
      fd.append('file', file);
      try {
        const res = await fetch('/api/convert', { method: 'POST', body: fd });
        let data = null;
        try {
          data = await res.json();
        } catch {
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          throw new Error('サーバー応答を解析できませんでした');
        }
        if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
        if (data.error) throw new Error(data.error);

        state.texts = data.intermediate.texts || [];
        state.shapes = data.intermediate.shapes || [];
        state.images = data.intermediate.images || [];

        state.texts.forEach((t, i) => t._id = 't_' + i);
        state.shapes.forEach((s, i) => s._id = 's_' + i);
        state.images.forEach((img, i) => img._id = 'i_' + i);
        state.previewSvgMarkup = '';
        previewAppliedSignature = '';

        // 初回履歴保存
        historyState = []; historyIndex = -1;
        saveHistory();

        switchView();
      } catch (e) {
        alert('解析エラー: ' + e.message);
        dropHintText.textContent = 'エラーが発生しました。やり直してください。';
        dropZone.style.pointerEvents = 'auto';
      }
    }

    function switchView() {
      uploadView.style.display = 'none';
      editorView.style.display = 'block';
      headerActions.style.display = 'block';
      window.addEventListener('resize', fitCanvas);
      fitCanvas();
      renderCanvas();
    }

    function fitCanvas() {
      const pad = 80;
      const pw = canvasPane.clientWidth - pad;
      const ph = canvasPane.clientHeight - pad;
      scale = Math.min(pw / 940, ph / 580, 1.5);

      const scaler = document.getElementById('canvas-scaler');
      if (scaler) {
        scaler.style.width = (940 * scale) + 'px';
        scaler.style.height = (580 * scale) + 'px';
      }
      canvas.style.transform = `scale(${scale})`;
    }

    function getElementPixelSize(el) {
      if (!el) return { widthPx: 0, heightPx: 0 };
      if (typeof el.getBBox === 'function') {
        try {
          const box = el.getBBox();
          return { widthPx: box.width || 0, heightPx: box.height || 0 };
        } catch (_) {}
      }
      return {
        widthPx: el.offsetWidth || 0,
        heightPx: el.offsetHeight || 0
      };
    }

    function estimateTextBoxPx(text, fs, fw, ffStr, ls) {
      const lines = (text || '').split('\n');
      if (!textMeasureCtx) {
        return {
          widthPx: Math.max(...lines.map(line => line.length), 1) * fs,
          heightPx: fs * Math.max(lines.length, 1) * 1.2
        };
      }
      textMeasureCtx.font = `${fw} ${fs}px ${ffStr}`;
      let widthPx = 0;
      lines.forEach(line => {
        const glyphCount = Math.max((line || '').length - 1, 0);
        const measured = textMeasureCtx.measureText(line || '').width + glyphCount * ls;
        widthPx = Math.max(widthPx, measured);
      });
      return {
        widthPx: Math.max(widthPx, fs * 0.6),
        heightPx: fs * Math.max(lines.length, 1) * 1.2
      };
    }

    function buildCleanData() {
      return {
        card_size_mm: { w: 94, h: 58 },
        texts: state.texts.map(({ _id, ...rest }) => {
          const el = document.querySelector(`.ce[data-id="${_id}"]`);
          const { widthPx } = getElementPixelSize(el);
          return { ...rest, render_width: widthPx / 10 };
        }),
        shapes: state.shapes.map(({ _id, ...rest }) => rest),
        images: state.images.map(({ _id, ...rest }) => rest)
      };
    }

    function queuePreviewRender() {
      clearTimeout(previewTimer);
      previewTimer = setTimeout(refreshExactPreview, 160);
    }

    async function refreshExactPreview() {
      if (uploadView.style.display !== 'none' || editorView.style.display === 'none') return;

      const payload = buildCleanData();
      const signature = JSON.stringify(payload);
      if (signature === previewAppliedSignature) return;

      const token = ++previewRequestToken;
      try {
        const res = await fetch('/api/build_svg', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
        if (data.error) throw new Error(data.error);
        if (token !== previewRequestToken) return;

        state.previewSvgMarkup = data.svg || '';
        previewAppliedSignature = signature;
        renderCanvas({ skipPreviewRefresh: true });
      } catch (err) {
        console.error('SVG preview update failed:', err);
      }
    }

    function updateResizeBox() {
      const box = document.getElementById('resize-box');
      if (!box) return;
      if (state.selectedItems.length !== 1) {
        box.style.display = 'none';
        return;
      }
      const item = state.selectedItems[0];
      const el = document.querySelector(`.ce[data-id="${item.id}"]`);
      if (!el) {
        box.style.display = 'none';
        return;
      }
      let obj = null;
      if (item.type === 'text') obj = state.texts.find(x => x._id === item.id);
      if (item.type === 'shape') obj = state.shapes.find(x => x._id === item.id);
      if (item.type === 'image') obj = state.images.find(x => x._id === item.id);
      if (!obj) { box.style.display = 'none'; return; }
      const { widthPx, heightPx } = getElementPixelSize(el);

      box.style.left = (obj.x * 10) + 'px';
      box.style.top = (obj.y * 10) + 'px';
      box.style.width = widthPx + 'px';
      box.style.height = heightPx + 'px';
      box.style.display = 'block';
    }

    function renderCanvas(options = {}) {
      canvas.innerHTML = `
        <div class="canvas-border"></div>
        <div id="selection-box" style="position:absolute; border:1px dashed var(--accent); background:rgba(124,111,247,0.15); pointer-events:none; display:none; z-index:100;"></div>
        <div id="guide-x" style="position:absolute; width:1.5px; height:100%; top:0; background:rgba(0, 255, 255, 0.8); box-shadow:0 0 4px rgba(0,255,255,0.4); pointer-events:none; display:none; z-index:1000;"></div>
        <div id="guide-y" style="position:absolute; height:1.5px; width:100%; left:0; background:rgba(0, 255, 255, 0.8); box-shadow:0 0 4px rgba(0,255,255,0.4); pointer-events:none; display:none; z-index:1000;"></div>
        <div id="resize-box" style="position:absolute; display:none; pointer-events:none; z-index:200;">
           <div class="rs-handle" data-dir="tl" style="pointer-events:auto; position:absolute; left:-5px; top:-5px; cursor:nwse-resize;"></div>
           <div class="rs-handle" data-dir="tc" style="pointer-events:auto; position:absolute; left:calc(50% - 5px); top:-5px; cursor:ns-resize;"></div>
           <div class="rs-handle" data-dir="tr" style="pointer-events:auto; position:absolute; right:-5px; top:-5px; cursor:nesw-resize;"></div>
           <div class="rs-handle" data-dir="rc" style="pointer-events:auto; position:absolute; right:-5px; top:calc(50% - 5px); cursor:ew-resize;"></div>
           <div class="rs-handle" data-dir="br" style="pointer-events:auto; position:absolute; right:-5px; bottom:-5px; cursor:nwse-resize;"></div>
           <div class="rs-handle" data-dir="bc" style="pointer-events:auto; position:absolute; left:calc(50% - 5px); bottom:-5px; cursor:ns-resize;"></div>
           <div class="rs-handle" data-dir="bl" style="pointer-events:auto; position:absolute; left:-5px; bottom:-5px; cursor:nesw-resize;"></div>
           <div class="rs-handle" data-dir="lc" style="pointer-events:auto; position:absolute; left:-5px; top:calc(50% - 5px); cursor:ew-resize;"></div>
        </div>
      `;
      const hasExactPreview = !!state.previewSvgMarkup;

      if (hasExactPreview) {
        const previewHost = document.createElement('div');
        previewHost.id = 'exact-svg-preview';
        previewHost.style.cssText = 'position:absolute;inset:0;pointer-events:none;z-index:4;overflow:hidden;';
        previewHost.innerHTML = state.previewSvgMarkup;
        const svgRoot = previewHost.querySelector('svg');
        if (svgRoot) {
          svgRoot.style.width = '940px';
          svgRoot.style.height = '580px';
          svgRoot.style.display = 'block';
          svgRoot.style.pointerEvents = 'none';
          svgRoot.setAttribute('preserveAspectRatio', 'xMinYMin meet');
        }
        canvas.appendChild(previewHost);
      }

      state.shapes.forEach(s => {
        const el = document.createElement('div');
        el.className = 'ce ce-shape';
        el.dataset.id = s._id; el.dataset.type = 'shape';
        el.style.left = (s.x * 10) + 'px';
        el.style.top = (s.y * 10) + 'px';
        el.style.width = (s.w * 10) + 'px';
        el.style.height = (s.h * 10) + 'px';
        el.style.background = s.fill || '#ccc';
        if (hasExactPreview) {
          el.style.opacity = '0';
          el.style.borderColor = 'transparent';
        }
        if (s.type === 'circle') el.style.borderRadius = '50%';
        else if (s.type === 'rounded_rect') el.style.borderRadius = '6px';
        if (state.selectedItems.some(i => i.id === s._id)) el.classList.add('selected');
        canvas.appendChild(el);
      });

      state.images.forEach(img => {
        // imgはvoid要素なのでdivラッパーに包む（リサイズハンドルを子に追加するため）
        const wrapper = document.createElement('div');
        wrapper.className = 'ce ce-image-wrapper';
        wrapper.dataset.id = img._id; wrapper.dataset.type = 'image';
        wrapper.style.position = 'absolute';
        wrapper.style.left = (img.x * 10) + 'px';
        wrapper.style.top = (img.y * 10) + 'px';
        wrapper.style.width = (img.w * 10) + 'px';
        wrapper.style.height = (img.h * 10) + 'px';
        if (state.selectedItems.some(i => i.id === img._id)) wrapper.classList.add('selected');

        const el = document.createElement('img');
        el.className = 'ce-image';
        el.draggable = false;
        el.src = img.href;
        el.style.width = '100%';
        el.style.height = '100%';
        el.style.objectFit = 'contain';
        el.style.display = 'block';
        if (hasExactPreview) el.style.opacity = '0';
        el.style.pointerEvents = 'none'; // クリックはwrapperで受ける
        wrapper.appendChild(el);
        canvas.appendChild(wrapper);
      });

      // ── SVGレイヤー（テキスト専用）──
      const svgNS = 'http://www.w3.org/2000/svg';
      const svgLayer = document.createElementNS(svgNS, 'svg');
      svgLayer.setAttribute('xmlns', svgNS);
      svgLayer.setAttribute('viewBox', '0 0 940 580');
      svgLayer.style.cssText = 'position:absolute;inset:0;width:940px;height:580px;overflow:visible;pointer-events:none;z-index:5;';

      // フィルター定義用defsを先に追加
      const svgDefs = document.createElementNS(svgNS, 'defs');
      svgLayer.appendChild(svgDefs);

      // ── テキスト要素ヘルパー ──
      const mkText = (svgNS, line, x, y, fs, fw, ffStr, ls, attrs = {}) => {
        const te = document.createElementNS(svgNS, 'text');
        te.setAttribute('x', x); te.setAttribute('y', y);
        te.setAttribute('font-family', ffStr); te.setAttribute('font-size', fs);
        te.setAttribute('font-weight', fw);
        if (ls > 0) te.setAttribute('letter-spacing', ls);
        Object.entries(attrs).forEach(([k,v]) => te.setAttribute(k, v));
        te.textContent = line || '';
        return te;
      };

      state.texts.forEach(t => {
        const ff = t.font_family || (t.font_group === 'mincho' ? 'Noto Serif JP' : 'Noto Sans JP');
        const ffStr = ff === 'Noto Serif JP' ? "'Noto Serif JP', serif"
                    : ff === 'Noto Sans JP'  ? "'Noto Sans JP', sans-serif"
                    : `'${ff}', sans-serif`;
        const fs = (t.font_size || 3) * 10;
        const fw = t.font_weight || '400';
        const mainCol = t.color || '#000000';
        const strkCol = t.stroke_color || '#7c6ff7';
        const strkW   = t.stroke_width ? t.stroke_width * 0.352778 * 10 : 0;
        const ls      = t.letter_spacing > 0 ? t.letter_spacing * 10 : 0;
        const effect  = t.text_effect || 'normal';
        const isSelected = state.selectedItems.some(i => i.id === t._id);

        const g = document.createElementNS(svgNS, 'g');
        g.dataset.id = t._id; g.dataset.type = 'text';
        g.style.cursor = 'grab'; g.style.pointerEvents = 'all';
        g.classList.add('ce');
        if (isSelected) g.classList.add('selected');

        const lines  = (t.text || '').split('\n');
        const baseX  = t.x * 10;
        const baseY  = t.y * 10 + fs * 0.85;
        const textBox = estimateTextBoxPx(t.text || '', fs, fw, ffStr, ls);
        g.dataset.x = baseX; g.dataset.y = t.y * 10;
        g.dataset.w = String(textBox.widthPx); g.dataset.h = String(textBox.heightPx);

        const hitbox = document.createElementNS(svgNS, 'rect');
        hitbox.setAttribute('x', baseX);
        hitbox.setAttribute('y', t.y * 10);
        hitbox.setAttribute('width', textBox.widthPx);
        hitbox.setAttribute('height', textBox.heightPx);
        hitbox.setAttribute('fill', 'transparent');
        hitbox.setAttribute('pointer-events', 'all');
        g.appendChild(hitbox);

        const mk = (line, x, y, attrs) => mkText(svgNS, line, x, y, fs, fw, ffStr, ls, attrs);

        if (!hasExactPreview) switch (effect) {

          case 'fukuro': { // 袋文字: 厚いStroke後ろに塗り
            const sw = strkW > 0 ? strkW : fs * 0.15;
            lines.forEach((ln, i) => g.appendChild(mk(ln, baseX, baseY + i*fs*1.2, {
              fill: 'none', stroke: strkCol, 'stroke-width': sw*2,
              'stroke-linejoin': 'round', 'stroke-miterlimit': '10'
            })));
            lines.forEach((ln, i) => g.appendChild(mk(ln, baseX, baseY + i*fs*1.2, { fill: mainCol })));
            break;
          }

          case 'background': { // 背景: 塗りつぶし背景 + テキスト
            const pad = fs * 0.15;
            const rect = document.createElementNS(svgNS, 'rect');
            rect.setAttribute('x', baseX - pad);
            rect.setAttribute('y', baseY - fs * 0.85 - pad);
            rect.setAttribute('width', 220); rect.setAttribute('height', fs * lines.length * 1.2 + pad * 2);
            rect.setAttribute('fill', strkCol); rect.setAttribute('rx', '5');
            g.appendChild(rect);
            lines.forEach((ln, i) => g.appendChild(mk(ln, baseX, baseY + i*fs*1.2, { fill: mainCol })));
            break;
          }

          case 'splice': { // スプライス: オフセット二重文字
            const off = fs * 0.08;
            lines.forEach((ln, i) => g.appendChild(mk(ln, baseX+off, baseY+i*fs*1.2+off*0.5, {
              fill: 'none', stroke: strkCol, 'stroke-width': strkW > 0 ? strkW : fs*0.05,
              'stroke-linejoin': 'round', 'stroke-miterlimit': '10'
            })));
            lines.forEach((ln, i) => g.appendChild(mk(ln, baseX, baseY + i*fs*1.2, {
              fill: 'none', stroke: strkCol, 'stroke-width': strkW > 0 ? strkW*0.5 : fs*0.02,
              'stroke-linejoin': 'round', 'stroke-miterlimit': '10'
            })));
            lines.forEach((ln, i) => g.appendChild(mk(ln, baseX, baseY + i*fs*1.2, { fill: mainCol })));
            break;
          }

          case 'nuki': { // 中抜き: Strokeのみ、塗りなし
            const sw = strkW > 0 ? strkW : fs * 0.06;
            lines.forEach((ln, i) => g.appendChild(mk(ln, baseX, baseY + i*fs*1.2, {
              fill: 'none', stroke: strkCol, 'stroke-width': sw, 'stroke-linejoin': 'round'
            })));
            break;
          }

          case 'neon': { // ネオン: SVGフィルターによるグロー
            const fid = 'neon-' + t._id;
            const filter = document.createElementNS(svgNS, 'filter');
            filter.setAttribute('id', fid);
            filter.setAttribute('x', '-60%'); filter.setAttribute('y', '-60%');
            filter.setAttribute('width', '220%'); filter.setAttribute('height', '220%');
            const blur1 = document.createElementNS(svgNS, 'feGaussianBlur');
            blur1.setAttribute('stdDeviation', '3'); blur1.setAttribute('result', 'blur1');
            const blur2 = document.createElementNS(svgNS, 'feGaussianBlur');
            blur2.setAttribute('in', 'SourceGraphic'); blur2.setAttribute('stdDeviation', '8'); blur2.setAttribute('result', 'blur2');
            const merge = document.createElementNS(svgNS, 'feMerge');
            ['blur2','blur2','blur1','SourceGraphic'].forEach(v => {
              const n = document.createElementNS(svgNS, 'feMergeNode'); n.setAttribute('in', v); merge.appendChild(n);
            });
            filter.appendChild(blur1); filter.appendChild(blur2); filter.appendChild(merge);
            svgDefs.appendChild(filter);
            lines.forEach((ln, i) => g.appendChild(mk(ln, baseX, baseY + i*fs*1.2, {
              fill: mainCol, stroke: strkCol, 'stroke-width': '0.5', filter: `url(#${fid})`
            })));
            break;
          }

          case 'glitch': { // グリッチ: RGB色ズレ
            const off = fs * 0.06;
            lines.forEach((ln, i) => g.appendChild(mk(ln, baseX-off, baseY+i*fs*1.2, { fill:'#00ffff', opacity:'0.85' })));
            lines.forEach((ln, i) => g.appendChild(mk(ln, baseX+off, baseY+i*fs*1.2, { fill:'#ff00aa', opacity:'0.85' })));
            lines.forEach((ln, i) => g.appendChild(mk(ln, baseX,    baseY+i*fs*1.2, { fill: mainCol })));
            break;
          }

          default: { // normal
            lines.forEach((ln, i) => {
              if (strkW > 0) {
                g.appendChild(mk(ln, baseX, baseY + i*fs*1.2, {
                  fill: 'none',
                  stroke: strkCol,
                  'stroke-width': strkW,
                  'stroke-linejoin': 'round',
                  'stroke-miterlimit': '10'
                }));
              }
              g.appendChild(mk(ln, baseX, baseY + i*fs*1.2, { fill: mainCol }));
            });
          }
        }

        svgLayer.appendChild(g);
      });


      canvas.appendChild(svgLayer);

      // ── リサイズハンドル（shape/imageのみ、単一選択時）──
      if (state.selectedItems.length === 1) {
        const si = state.selectedItems[0];
        if (si.type === 'shape' || si.type === 'image') {
          const el = document.querySelector(`.ce[data-id="${si.id}"]`);
          if (el) {
            ['nw','n','ne','e','se','s','sw','w'].forEach(dir => {
              const h = document.createElement('div');
              h.className = 'resize-handle';
              h.dataset.dir = dir;
              h.dataset.targetId = si.id;
              h.dataset.targetType = si.type;
              el.appendChild(h);
            });
          }
        }
      }

      if (!options.skipPreviewRefresh) {
        queuePreviewRender();
      }
    }



    // ── ドラッグ & ドロップ ＆ 範囲選択 ──
    let isDragging = false;
    let dragMoved = false;
    let dragStartX = 0, dragStartY = 0;
    let dragInitialStates = [];

    let isBoxSelecting = false;
    let boxStartX = 0, boxStartY = 0;

    let snapLinesX = [];
    let snapLinesY = [];

    let isResizing = false;
    let resizeDir = '';
    let resizeStartX = 0, resizeStartY = 0;
    let resizeStartW = 0, resizeStartH = 0;
    let resizeStartObjX = 0, resizeStartObjY = 0;
    let resizeStartFontSize = 0;
    let resizeObj = null;

    canvas.addEventListener('mousedown', e => {
      if (e.target.classList.contains('rs-handle')) {
        e.stopPropagation();
        e.preventDefault();
        if (state.selectedItems.length !== 1) return;

        isResizing = true;
        resizeDir = e.target.dataset.dir;
        resizeStartX = e.clientX;
        resizeStartY = e.clientY;

        const itemId = state.selectedItems[0].id;
        const type = state.selectedItems[0].type;

        if (type === 'text') resizeObj = state.texts.find(x => x._id === itemId);
        if (type === 'shape') resizeObj = state.shapes.find(x => x._id === itemId);
        if (type === 'image') resizeObj = state.images.find(x => x._id === itemId);

        const el = document.querySelector(`.ce[data-id="${itemId}"]`);
        const { widthPx, heightPx } = getElementPixelSize(el);
        resizeStartW = widthPx / 10;
        resizeStartH = heightPx / 10;
        resizeStartObjX = resizeObj.x;
        resizeStartObjY = resizeObj.y;
        if (type === 'text') resizeStartFontSize = resizeObj.font_size;
        return;
      }

      const el = e.target.closest('.ce');
      const isMulti = e.shiftKey || e.ctrlKey || e.metaKey;

      if (!el) {
        if (!isMulti) selectItem(null, null, false);

        // 範囲選択の開始
        isBoxSelecting = true;
        const canvasRect = canvas.getBoundingClientRect();
        boxStartX = (e.clientX - canvasRect.left) / scale;
        boxStartY = (e.clientY - canvasRect.top) / scale;

        const selBox = document.getElementById('selection-box');
        if (selBox) {
          selBox.style.left = boxStartX + 'px';
          selBox.style.top = boxStartY + 'px';
          selBox.style.width = '0px';
          selBox.style.height = '0px';
          selBox.style.display = 'block';
        }
        return;
      }

      const id = el.dataset.id;
      const type = el.dataset.type;

      const isAlreadySelected = state.selectedItems.some(i => i.id === id);
      if (!isAlreadySelected || isMulti) {
        if (isAlreadySelected && isMulti) {
          selectItem(id, type, true, true);
        } else {
          selectItem(id, type, isMulti);
        }
      }

      if (state.selectedItems.length > 0) {
        isDragging = true;
        dragMoved = false;
        dragStartX = e.clientX;
        dragStartY = e.clientY;

        dragInitialStates = state.selectedItems.map(item => {
          let d = null;
          if (item.type === 'text') d = state.texts.find(x => x._id === item.id);
          if (item.type === 'shape') d = state.shapes.find(x => x._id === item.id);
          if (item.type === 'image') d = state.images.find(x => x._id === item.id);
          const el = document.querySelector(`.ce[data-id="${item.id}"]`);
          return { item: d, el, type: item.type, startX: d.x, startY: d.y };
        }).filter(x => x.item);

        snapLinesX = [];
        snapLinesY = [];
        [...state.texts, ...state.shapes, ...state.images].forEach(item => {
          if (state.selectedItems.some(si => si.id === item._id)) return;
          const el = document.querySelector(`.ce[data-id="${item._id}"]`);
          if (!el) return;
          const { widthPx, heightPx } = getElementPixelSize(el);
          const w = widthPx / 10;
          const h = heightPx / 10;
          snapLinesX.push(item.x, item.x + w / 2, item.x + w);
          snapLinesY.push(item.y, item.y + h / 2, item.y + h);
        });
        snapLinesX = [...new Set(snapLinesX)].sort((a, b) => a - b);
        snapLinesY = [...new Set(snapLinesY)].sort((a, b) => a - b);
      }
    });

    window.addEventListener('mousemove', e => {
      if (isResizing && resizeObj) {
        const deltaX = (e.clientX - resizeStartX) / scale / 10;
        const deltaY = (e.clientY - resizeStartY) / scale / 10;

        let newX = resizeStartObjX;
        let newY = resizeStartObjY;
        let newW = resizeStartW;
        let newH = resizeStartH;

        if (resizeDir.includes('l')) { newX += deltaX; newW -= deltaX; }
        if (resizeDir.includes('r')) { newW += deltaX; }
        if (resizeDir.includes('t')) { newY += deltaY; newH -= deltaY; }
        if (resizeDir.includes('b')) { newH += deltaY; }

        if (newW < 2) { newX -= (2 - newW) * (resizeDir.includes('l') ? -1 : 0); newW = 2; }
        if (newH < 2) { newY -= (2 - newH) * (resizeDir.includes('t') ? -1 : 0); newH = 2; }

        resizeObj.x = parseFloat(newX.toFixed(2));
        resizeObj.y = parseFloat(newY.toFixed(2));

        if (state.selectedItems[0].type === 'text') {
          let scalar = 1.0;
          if (resizeDir === 'tc' || resizeDir === 'bc') scalar = newH / Math.max(0.1, resizeStartH);
          else scalar = newW / Math.max(0.1, resizeStartW);

          resizeObj.font_size = Math.max(1, parseFloat((resizeStartFontSize * scalar).toFixed(2)));
          resizeObj.font_size_pt = parseFloat((resizeObj.font_size / 0.352778).toFixed(1));
        } else {
          resizeObj.w = parseFloat(newW.toFixed(2));
          resizeObj.h = parseFloat(newH.toFixed(2));
        }

        renderCanvas();

        const pX = document.getElementById('prop-x');
        const pY = document.getElementById('prop-y');
        const pW = document.getElementById('prop-w');
        const pH = document.getElementById('prop-h');
        const pFs = document.getElementById('prop-fs-pt');
        if (pX) pX.value = resizeObj.x;
        if (pY) pY.value = resizeObj.y;
        if (state.selectedItems[0].type === 'text') {
          if (pFs) pFs.value = resizeObj.font_size_pt;
        } else {
          if (pW) pW.value = resizeObj.w;
          if (pH) pH.value = resizeObj.h;
        }
        return;
      }

      if (isBoxSelecting) {
        const canvasRect = canvas.getBoundingClientRect();
        let currX = (e.clientX - canvasRect.left) / scale;
        let currY = (e.clientY - canvasRect.top) / scale;

        currX = Math.max(0, Math.min(940, currX));
        currY = Math.max(0, Math.min(580, currY));

        const x = Math.min(boxStartX, currX);
        const y = Math.min(boxStartY, currY);
        const w = Math.abs(currX - boxStartX);
        const h = Math.abs(currY - boxStartY);

        const selBox = document.getElementById('selection-box');
        if (selBox) {
          selBox.style.left = x + 'px';
          selBox.style.top = y + 'px';
          selBox.style.width = w + 'px';
          selBox.style.height = h + 'px';
        }
        return;
      }

      if (!isDragging || dragInitialStates.length === 0) return;
      const canvasRect = canvas.getBoundingClientRect();

      let deltaX = (e.clientX - dragStartX) / scale / 10;
      let deltaY = (e.clientY - dragStartY) / scale / 10;

      let snapGuideX = null;
      let snapGuideY = null;

      if (dragInitialStates.length === 1 && !e.altKey) {
        const d = dragInitialStates[0];
        const { widthPx, heightPx } = getElementPixelSize(d.el);
        const w = widthPx / 10;
        const h = heightPx / 10;
        const SNAP_DIST = 1.0;

        const testX = [
          { val: d.startX + deltaX, offset: 0 },
          { val: d.startX + deltaX + w / 2, offset: w / 2 },
          { val: d.startX + deltaX + w, offset: w }
        ];
        let minDX = SNAP_DIST;
        testX.forEach(edge => {
          snapLinesX.forEach(line => {
            if (Math.abs(edge.val - line) < minDX) {
              minDX = Math.abs(edge.val - line);
              deltaX = line - (d.startX + edge.offset);
              snapGuideX = line;
            }
          });
        });

        const testY = [
          { val: d.startY + deltaY, offset: 0 },
          { val: d.startY + deltaY + h / 2, offset: h / 2 },
          { val: d.startY + deltaY + h, offset: h }
        ];
        let minDY = SNAP_DIST;
        testY.forEach(edge => {
          snapLinesY.forEach(line => {
            if (Math.abs(edge.val - line) < minDY) {
              minDY = Math.abs(edge.val - line);
              deltaY = line - (d.startY + edge.offset);
              snapGuideY = line;
            }
          });
        });
      }

      const gx = document.getElementById('guide-x');
      const gy = document.getElementById('guide-y');
      if (gx) {
        if (snapGuideX !== null) { gx.style.left = (snapGuideX * 10) + 'px'; gx.style.display = 'block'; }
        else gx.style.display = 'none';
      }
      if (gy) {
        if (snapGuideY !== null) { gy.style.top = (snapGuideY * 10) + 'px'; gy.style.display = 'block'; }
        else gy.style.display = 'none';
      }

      if (Math.abs(deltaX) > 0.1 || Math.abs(deltaY) > 0.1) dragMoved = true;

      dragInitialStates.forEach(d => {
        d.item.x = parseFloat((d.startX + deltaX).toFixed(2));
        d.item.y = parseFloat((d.startY + deltaY).toFixed(2));
        if (d.el) {
          if (d.type === 'text') {
            // SVG g要素はtransformで移動プレビュー
            const dx = (d.item.x - d.startX) * 10;
            const dy = (d.item.y - d.startY) * 10;
            d.el.setAttribute('transform', `translate(${dx},${dy})`);
          } else {
            d.el.style.left = (d.item.x * 10) + 'px';
            d.el.style.top = (d.item.y * 10) + 'px';
          }
        }
      });

      if (state.selectedItems.length === 1) {
        updateResizeBox();
        const xInp = document.getElementById('prop-x');
        const yInp = document.getElementById('prop-y');
        if (xInp) xInp.value = dragInitialStates[0].item.x;
        if (yInp) yInp.value = dragInitialStates[0].item.y;
      }
    });

    window.addEventListener('mouseup', e => {
      if (isResizing) {
        isResizing = false;
        resizeObj = null;
        saveHistory();
        return;
      }

      const gx = document.getElementById('guide-x');
      const gy = document.getElementById('guide-y');
      if (gx) gx.style.display = 'none';
      if (gy) gy.style.display = 'none';

      if (isBoxSelecting) {
        isBoxSelecting = false;
        const selBox = document.getElementById('selection-box');
        if (selBox) {
          selBox.style.display = 'none';
          const bx = parseFloat(selBox.style.left);
          const by = parseFloat(selBox.style.top);
          const bw = parseFloat(selBox.style.width);
          const bh = parseFloat(selBox.style.height);

          if (bw > 5 && bh > 5) {
            let newSel = [];
            document.querySelectorAll('.ce').forEach(el => {
              let ex, ey, ew, eh;
              // SVG g要素はdata属性から座標取得
              if (el.tagName === 'g' || el.closest('svg')) {
                ex = parseFloat(el.dataset.x) || 0;
                ey = parseFloat(el.dataset.y) || 0;
                ew = parseFloat(el.dataset.w) || 0;
                eh = parseFloat(el.dataset.h) || 0;
              } else {
                ex = parseFloat(el.style.left);
                ey = parseFloat(el.style.top);
                const { widthPx, heightPx } = getElementPixelSize(el);
                ew = widthPx;
                eh = heightPx;
              }
              if (!isNaN(ex) && ex < bx + bw && ex + ew > bx && ey < by + bh && ey + eh > by) {
                newSel.push({ id: el.dataset.id, type: el.dataset.type });
              }
            });
            newSel = newSel.filter(x => x.id && x.type);

            const isMulti = e.shiftKey || e.ctrlKey || e.metaKey;
            if (isMulti) {
              newSel.forEach(ns => {
                if (!state.selectedItems.some(i => i.id === ns.id)) state.selectedItems.push(ns);
              });
            } else {
              state.selectedItems = newSel;
            }

            renderCanvas(); // リサイズハンドル反映のため全再描画
            renderProperties();
          }
        }
      }

      if (isDragging) {
        if (dragMoved) {
          renderCanvas(); // SVGテキストの正確な位置に確定
          saveHistory();
        }
        isDragging = false;
        dragInitialStates = [];
        dragMoved = false;
      }
    });

    window.changeZIndex = function (action) {
      if (state.selectedItems.length === 0) return;
      state.selectedItems.forEach(sel => {
        const arr = state[sel.type + 's'];
        if (!arr) return;
        const idx = arr.findIndex(x => x._id === sel.id);
        if (idx === -1) return;

        const item = arr.splice(idx, 1)[0];
        if (action === 'front') arr.push(item);
        else if (action === 'back') arr.unshift(item);
        else if (action === 'up') arr.splice(Math.min(arr.length, idx + 1), 0, item);
        else if (action === 'down') arr.splice(Math.max(0, idx - 1), 0, item);
      });
      renderCanvas();
      saveHistory();
    };

    // ── プロパティペイン ──
    function selectItem(id, type, isMulti = false, toggleOff = false) {
      if (!id) {
        state.selectedItems = [];
      } else {
        const existingIdx = state.selectedItems.findIndex(i => i.id === id);
        if (isMulti) {
          if (toggleOff && existingIdx >= 0) state.selectedItems.splice(existingIdx, 1);
          else if (existingIdx === -1) state.selectedItems.push({ id, type });
        } else {
          state.selectedItems = [{ id, type }];
        }
      }

      renderCanvas(); // リサイズハンドルを即時描画するために必要
      renderProperties();
    }

    // ── テキストエフェクト設定 ──
    window.setTextEffect = function(effectName) {
      if (state.selectedItems.length !== 1) return;
      const si = state.selectedItems[0];
      if (si.type !== 'text') return;
      const d = state.texts.find(x => x._id === si.id);
      if (!d) return;
      d.text_effect = effectName;
      renderCanvas();
      renderProperties();
      saveHistory();
    };

    // ── 整列機能 ──
    window.alignSelected = function (mode) {
      if (state.selectedItems.length < 2) return;


      const items = state.selectedItems.map(si => {
        if (si.type === 'text') return state.texts.find(x => x._id === si.id);
        if (si.type === 'shape') return state.shapes.find(x => x._id === si.id);
        if (si.type === 'image') return state.images.find(x => x._id === si.id);
      }).filter(Boolean);

      let target = 0;
      if (mode === 'left') {
        target = Math.min(...items.map(i => i.x));
        items.forEach(i => i.x = target);
      } else if (mode === 'top') {
        target = Math.min(...items.map(i => i.y));
        items.forEach(i => i.y = target);
      } else if (mode === 'bottom') {
        items.forEach(i => {
          let el = document.querySelector(`.ce[data-id="${i._id}"]`);
          i.bottomEdge = i.y + (el ? getElementPixelSize(el).heightPx / 10 : (i.h || 0));
        });
        target = Math.max(...items.map(i => i.bottomEdge));
        items.forEach(i => {
          let el = document.querySelector(`.ce[data-id="${i._id}"]`);
          let h = el ? getElementPixelSize(el).heightPx / 10 : (i.h || 0);
          i.y = parseFloat((target - h).toFixed(2));
        });
      } else if (mode === 'right') {
        items.forEach(i => {
          let el = document.querySelector(`.ce[data-id="${i._id}"]`);
          i.rightEdge = i.x + (el ? getElementPixelSize(el).widthPx / 10 : (i.w || 0));
        });
        target = Math.max(...items.map(i => i.rightEdge));
        items.forEach(i => {
          let el = document.querySelector(`.ce[data-id="${i._id}"]`);
          let w = el ? getElementPixelSize(el).widthPx / 10 : (i.w || 0);
          i.x = parseFloat((target - w).toFixed(2));
        });
      } else if (mode === 'center') {
        let cxSum = 0;
        items.forEach(i => {
          let el = document.querySelector(`.ce[data-id="${i._id}"]`);
          cxSum += i.x + (el ? getElementPixelSize(el).widthPx / 20 : (i.w || 0) / 2);
        });
        target = cxSum / items.length;
        items.forEach(i => {
          let el = document.querySelector(`.ce[data-id="${i._id}"]`);
          let w = el ? getElementPixelSize(el).widthPx / 10 : (i.w || 0);
          i.x = parseFloat((target - w / 2).toFixed(2));
        });
      }
      renderCanvas();
      if (state.selectedItems.length === 1) renderProperties();

      saveHistory(); // 整列後に保存
    };

  <text x="40" y="37" text-anchor="middle" font-family="Georgia,serif" font-size="34" font-weight="700" fill="#7c6ff7">Ag</text>
</svg>`,
        };
        const effectDefs = [
          { id:'normal',     label:'通常'       },
          { id:'fukuro',     label:'袋文字'     },
          { id:'background', label:'背景'       },
          { id:'splice',     label:'スプライス' },
          { id:'nuki',       label:'中抜き'     },
          { id:'neon',       label:'ネオン'     },
          { id:'glitch',     label:'グリッチ'   },
        ];
        const curEffect = d.text_effect || 'normal';
        html += `
          <div class="prop-group">
            <label>テキスト内容</label>
            <textarea id="prop-text">${d.text}</textarea>
          </div>
          <div class="prop-row prop-group">
            <div style="flex:1">
               <label>フォント＆太さ</label>
               <select id="prop-font-select">
                   ${buildFontSelect(d.font_family || 'Noto Sans JP', d.font_weight || '400')}
               </select>
            </div>
          </div>
          <div class="prop-row prop-group">
            <div style="flex:1"><label>サイズ(pt)</label><input type="number" step="0.5" id="prop-fs-pt" value="${d.font_size_pt ? d.font_size_pt.toFixed(1) : (d.font_size / 0.352778).toFixed(1)}"></div>
            <div style="flex:1"><label>文字間(mm)</label><input type="number" step="0.5" id="prop-ls" value="${d.letter_spacing || 0}"></div>
          </div>
          <div class="prop-group" style="padding:8px; background:rgba(124,111,247,0.05); border-radius:6px; margin-bottom:6px;">
            <label style="font-size:10px; color:var(--accent); font-weight:700; text-transform:uppercase; letter-spacing:0.05em;">🎨 塗り Fill</label>
            <div style="display:flex; gap:4px; margin-top:4px; align-items:center;">
              <input type="color" id="prop-color-picker" value="${(d.color||'#000000').slice(0,7)}" style="width:32px;height:28px;padding:1px;border:none;border-radius:4px;cursor:pointer;flex-shrink:0;">
              <input type="text" id="prop-color" value="${d.color || '#000000'}" style="flex:1; font-size:11px; font-family:monospace;">
            </div>
            <div style="display:grid; grid-template-columns:repeat(12,1fr); gap:3px; margin-top:6px;">
              ${['#000000','#FFFFFF','#FF0000','#FF8800','#FFFF00','#00CC00','#0088FF','#8800FF','#FF00FF','#CCCCCC','#884400','#004488'].map(c=>`<div onclick="(function(){var i=document.getElementById('prop-color');i.value='${c}';i.dispatchEvent(new Event('input'));document.getElementById('prop-color-picker').value='${c}';})()"
                style="background:${c};border:1px solid rgba(255,255,255,0.2);border-radius:2px;height:14px;cursor:pointer;"></div>`).join('')}
            </div>
          </div>
          <div class="prop-group" style="padding:8px; background:rgba(247,112,176,0.05); border-radius:6px; margin-bottom:6px;">
            <label style="font-size:10px; color:#f770b0; font-weight:700; text-transform:uppercase; letter-spacing:0.05em;">✏️ 線 Stroke</label>
            <div style="display:flex; gap:4px; margin-top:4px; align-items:center;">
              <input type="color" id="prop-stroke-color-picker" value="${(d.stroke_color||'#ff0000').slice(0,7)}" style="width:32px;height:28px;padding:1px;border:none;border-radius:4px;cursor:pointer;flex-shrink:0;">
              <input type="text" id="prop-stroke-color" value="${d.stroke_color||''}" placeholder="#FF0000" style="flex:1; font-size:11px; font-family:monospace;">
              <input type="number" id="prop-stroke-width" value="${d.stroke_width||''}" placeholder="pt" step="0.5" min="0" style="width:48px; font-size:11px;" title="線の太さ(pt)">
            </div>
            <div style="display:grid; grid-template-columns:repeat(12,1fr); gap:3px; margin-top:6px;">
              ${['#000000','#FFFFFF','#FF0000','#FF8800','#FFFF00','#00CC00','#0088FF','#8800FF','#FF00FF','#CCCCCC','#884400','#004488'].map(c=>`<div onclick="(function(){var i=document.getElementById('prop-stroke-color');i.value='${c}';i.dispatchEvent(new Event('input'));document.getElementById('prop-stroke-color-picker').value='${c}';})()"
                style="background:${c};border:1px solid rgba(255,255,255,0.2);border-radius:2px;height:14px;cursor:pointer;"></div>`).join('')}
            </div>
          </div>
          <div class="prop-group">
            <label style="font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.05em; color:var(--text-muted);">文字エフェクト</label>
            <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:5px; margin-top:6px;">
              ${effectDefs.map(ef => `
                <div onclick="window.setTextEffect('${ef.id}')" title="${ef.label}"
                     style="border-radius:8px; cursor:pointer; overflow:hidden; text-align:center;
                     background:${curEffect===ef.id ? 'rgba(124,111,247,0.2)' : 'rgba(255,255,255,0.03)'};
                     border:2px solid ${curEffect===ef.id ? 'var(--accent)' : 'rgba(255,255,255,0.12)'};
                     transition:all 0.15s; box-shadow:${curEffect===ef.id ? '0 0 8px rgba(124,111,247,0.4)' : 'none'};">
                  <img src="data:image/svg+xml;charset=utf-8,${encodeURIComponent(EI[ef.id])}"
                       width="100%" style="display:block; border-radius:6px 6px 0 0; aspect-ratio:8/5; object-fit:cover;">
                  <div style="font-size:9px; color:${curEffect===ef.id ? 'var(--accent)' : 'var(--text-muted)'}; padding:2px 0 3px; font-weight:${curEffect===ef.id ? '700' : '400'};">${ef.label}</div>
                </div>`)}
            </div>
          </div>
        `;




      } else if (type === 'image' || type === 'shape') {
        html += `
          <div class="prop-row prop-group">
            <div style="flex:1"><label>幅 (mm)</label><input type="number" step="1" id="prop-w" value="${d.w}"></div>
            <div style="flex:1"><label>高さ (mm)</label><input type="number" step="1" id="prop-h" value="${d.h}"></div>
          </div>
        `;
        if (type === 'shape') {
          html += `<div class="prop-group"><label>塗り色 (Hex)</label><input type="text" id="prop-color" value="${d.fill || '#CCCCCC'}">${buildPalette('prop-color')}</div>`;
        }
      }

      propsPanel.innerHTML = html;

      const bind = (id, key, isFloat, isStr) => {
        const el = document.getElementById(id);
        if (!el) return;
        el.addEventListener('input', e => {
          let val = e.target.value;
          if (!isStr) val = isFloat ? parseFloat(val) || 0 : parseInt(val) || 0;
          d[key] = val;
          renderCanvas();
        });
        el.addEventListener('change', () => saveHistory()); // 変更確定で履歴保存
      };

      bind('prop-x', 'x', true);
      bind('prop-y', 'y', true);
      bind('prop-w', 'w', true);
      bind('prop-h', 'h', true);
      bind('prop-text', 'text', false, true);
      bind('prop-stroke-color', 'stroke_color', false, true);
      bind('prop-stroke-width', 'stroke_width', true, false);

      const fontSelect = document.getElementById('prop-font-select');
      if (fontSelect) {
        fontSelect.addEventListener('change', e => {
          const [ff, fw] = e.target.value.split('|');
          d.font_family = ff;
          d.font_weight = parseInt(fw) || 400;
          renderCanvas();
          saveHistory();
        });
      }

      const fsPtEl = document.getElementById('prop-fs-pt');
      if (fsPtEl) {
        fsPtEl.addEventListener('input', e => {
          let pt = parseFloat(e.target.value) || 0;
          d.font_size_pt = pt;
          d.font_size = pt * 0.352778;
          renderCanvas();
        });
        fsPtEl.addEventListener('change', () => saveHistory());
      }

      bind('prop-ls', 'letter_spacing', true);
      bind('prop-color', type === 'shape' ? 'fill' : 'color', false, true);

      // カラーピッカー連携
      const cpFill = document.getElementById('prop-color-picker');
      if (cpFill) {
        cpFill.addEventListener('input', e => {
          const textEl = document.getElementById('prop-color');
          if (textEl) { textEl.value = e.target.value; textEl.dispatchEvent(new Event('input')); }
        });
      }
      const cpStroke = document.getElementById('prop-stroke-color-picker');
      if (cpStroke) {
        cpStroke.addEventListener('input', e => {
          const textEl = document.getElementById('prop-stroke-color');
          if (textEl) { textEl.value = e.target.value; textEl.dispatchEvent(new Event('input')); }
        });
      }
    }

    // ── ロゴ追加 ──
    addLogoBtn.addEventListener('click', () => logoInput.click());
    logoInput.addEventListener('change', e => {
      const f = e.target.files[0];
      if (!f) return;

      const reader = new FileReader();
      reader.onload = e2 => {
        const b64 = e2.target.result;
        const img = new Image();
        img.onload = () => {
          const aspect = img.width / img.height;
          let w = 20; let h = 20 / aspect;
          const newId = (window.crypto && window.crypto.randomUUID) ? window.crypto.randomUUID() : ('id_' + Math.random().toString(36).substr(2, 9));
          state.images.push({
            _id: newId, href: b64,
            x: 10, y: 10, w: parseFloat(w.toFixed(2)), h: parseFloat(h.toFixed(2))
          });
          selectItem(newId, 'image');
          saveHistory();
        };
        img.src = b64;
      };
      reader.readAsDataURL(f);
      e.target.value = '';
    });

    // ── 図形追加 ──
    const addRectBtn = document.getElementById('add-rect-btn');
    if (addRectBtn) {
      addRectBtn.addEventListener('click', () => {
        const newId = (window.crypto && window.crypto.randomUUID) ? window.crypto.randomUUID() : ('id_' + Math.random().toString(36).substr(2, 9));
        state.shapes.push({
          _id: newId, type: 'rect',
          x: 10, y: 10, w: 20, h: 20, fill: '#CCCCCC'
        });
        selectItem(newId, 'shape');
        saveHistory();
      });
    }

    const addCircleBtn = document.getElementById('add-circle-btn');
    if (addCircleBtn) {
      addCircleBtn.addEventListener('click', () => {
        const newId = (window.crypto && window.crypto.randomUUID) ? window.crypto.randomUUID() : ('id_' + Math.random().toString(36).substr(2, 9));
        state.shapes.push({
          _id: newId, type: 'circle',
          x: 10, y: 10, w: 20, h: 20, fill: '#CCCCCC'
        });
        selectItem(newId, 'shape');
        saveHistory();
      });
    }
    // ── SVG生成＆ダウンロード ──
    dlSvgBtn.addEventListener('click', async () => {
      dlSvgBtn.disabled = true;
      const prevHtml = dlSvgBtn.innerHTML;
      dlSvgBtn.innerHTML = '<span class="loader"></span>生成中...';
      const triggerSvgDownload = async (svgContent, fileName) => {
        try {
          const downloadRes = await fetch('/api/download', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ svg: svgContent, filename: fileName })
          });
          if (!downloadRes.ok) throw new Error(`download ${downloadRes.status}`);
          const blob = await downloadRes.blob();
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.style.display = 'none';
          a.href = url;
          a.download = fileName;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          setTimeout(() => URL.revokeObjectURL(url), 3000);
        } catch (err) {
          const blob = new Blob([svgContent], { type: 'image/svg+xml' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.style.display = 'none';
          a.href = url;
          a.download = fileName;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          setTimeout(() => URL.revokeObjectURL(url), 3000);
        }
      };

      const cleanData = buildCleanData();

      try {
        const res = await fetch('/api/build_svg', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(cleanData)
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error);

        const svgContent = data.svg;

        const fileName = 'business_card_edited.svg';
        await triggerSvgDownload(svgContent, fileName);
      } catch (e) {
        alert('SVG生成エラー: ' + e.message);
      } finally {
        dlSvgBtn.disabled = false;
        dlSvgBtn.innerHTML = prevHtml;
      }
    });
  </script>
</body>

</html>
